apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 10m
  install:
    timeout: 20m
  upgrade:
    timeout: 20m
  chart:
    spec:
      chart: immich
      version: "0.10.3"
      sourceRef:
        kind: HelmRepository
        name: immich
      interval: 10m
  values:
    controllers:
      main:
        containers:
          main:
            env:
              DB_HOSTNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-db
                    key: host
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-db
                    key: username
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-db
                    key: password
              DB_DATABASE_NAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-db
                    key: dbname
    immich:
      metrics:
        enabled: false # TODO: disabled metrics for now, since it relies on servicemonitor crds which are now not installed (was part of kube-prometheus-stack)
      persistence:
        library:
          existingClaim: immich-data
      configuration:
        newVersionCheck:
          enabled: false
        ffmpeg:
          acceptedVideoCodecs: [h264, hevc, vp9, av1]
        job:
          backgroundTask:
            concurrency: 100
          faceDetection:
            concurrency: 10
          thumbnailGeneration:
            concurrency: 5
    valkey:
      enabled: true
