apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rustfs
spec:
  interval: 10m
  install:
    timeout: 20m
  upgrade:
    timeout: 20m
  chart:
    spec:
      chart: rustfs
      version: "0.1.1"
      sourceRef:
        kind: HelmRepository
        name: rustfs
      interval: 10m
