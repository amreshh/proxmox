apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/filebrowser
  - secrets.yaml

patches:
  - target:
      kind: HTTPRoute
      name: filebrowser
    patch: |-
      - op: add
        path: "/spec/hostnames"
        value:
          - filebrowser.dev.kubernetes.home
