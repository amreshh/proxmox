# TODO: Check to restrict this further
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-ingress
spec:
  description: allow ingress from outside the cluster
  endpointSelector: {}
  ingress:
    - fromEntities:
        - world
  egress:
    - toEntities:
        - cluster
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-hubble
  namespace: kube-system
spec:
  description: allow hubble-ui ingress
  endpointSelector:
    matchLabels:
      "k8s:k8s-app": "hubble-ui"
  ingress:
    - fromEntities:
        - ingress
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:k8s-app": "hubble-relay"
      toPorts:
        - ports:
            - port: "4245"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-hubble-relay
  namespace: kube-system
spec:
  description: allow hubble-relay ingress
  endpointSelector:
    matchLabels:
      "k8s:k8s-app": "hubble-relay"
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:k8s-app": "hubble-ui"
  egress:
    - toEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "4244"
              protocol: TCP
            - port: "443"
              protocol: TCP
