---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: delete
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: org.democratic-csi.nfs
reclaimPolicy: Delete
mountOptions:
  - nfsvers=4.2
  # - nfsvers=3
  - noatime
  - hard
  # - nolock
  - sec=sys
  - noresvport
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: retain
provisioner: org.democratic-csi.nfs
reclaimPolicy: Retain
mountOptions:
  - nfsvers=4.2
  - noatime
  - hard

