apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: delete
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: org.democratic-csi.nfs
reclaimPolicy: Delete
mountOptions:
  - nfsvers=3
  - noatime
  - hard
  - nolock
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: retain
provisioner: org.democratic-csi.nfs
reclaimPolicy: Retain
mountOptions:
  - nfsvers=3
  - noatime
  - hard
  - nolock
