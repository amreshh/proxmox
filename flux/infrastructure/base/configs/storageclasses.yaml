apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: database
provisioner: org.democratic-csi.nfs
reclaimPolicy: Retain
mountOptions:
  - nfsvers=3
  - noatime
  - hard
  - nolock
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: delete
provisioner: org.democratic-csi.nfs
reclaimPolicy: Delete
mountOptions:
  - nfsvers=4.2
  - noatime
  - hard
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: retain
provisioner: org.democratic-csi.nfs
reclaimPolicy: Retain
mountOptions:
  - nfsvers=3
  - noatime
  - hard

