apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system
resources:
  - helm-repos.yaml
  # - cilium-network-policy.yaml
  - democratic-csi.yaml

patches:
  - target:
      kind: HelmRelease
      name: democratic-csi
    patch: |-
      - op: add
        path: "/spec/chart/spec/sourceRef/namespace"
        value: kube-system
  - target:
      kind: CiliumNetworkPolicy
      name: allow-democratic-csi
    patch: |-
      - op: add
        path: "/metadata/namespace"
        value: kube-system
