apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/democratic-csi
  - secrets.yaml

patches:
  - target:
      kind: HelmRelease
      name: democratic-csi
    patch: |-
      - op: add
        path: "/spec/values/driver/config/nfs/shareStrategySetDatasetProperties"
        value:
          properties:
            sharenfs: "-network 192.168.122.10/24 -mapall=65534:65534"
  - target:
      kind: CiliumNetworkPolicy
      name: allow-democratic-csi
    patch: |-
      - op: add
        path: "/spec/egress/-"
        value:
          toCIDR:
            - "192.168.122.10/32"
          toPorts:
            - ports:
                - port: "22"
                  protocol: TCP
                - port: "2049"
                  protocol: "TCP"
                - port: "111"
                  protocol: ANY
      - op: add
        path: "/spec/egress/-"
        value:
          toFQDNs:
          - matchName: "freebsd"
          toPorts:
            - ports:
                - port: "22"
                  protocol: TCP
                - port: "2049"
                  protocol: "TCP"
                - port: "111"
                  protocol: ANY
