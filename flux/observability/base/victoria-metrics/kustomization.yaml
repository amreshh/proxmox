apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: victoria-metrics
resources:
  - namespace.yaml
  - helm-repos.yaml
  - victoria-metrics.yaml
  - routes.yaml

patches:
  - target:
      kind: HelmRelease
      name: victoria-metrics
    patch: |-
      - op: add
        path: "/spec/chart/spec/sourceRef/namespace"
        value: victoria-metrics
