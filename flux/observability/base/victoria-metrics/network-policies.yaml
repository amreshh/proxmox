apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-grafana
spec:
  description: allow grafana ingress from agents and egress for plugins
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: vmagent
  egress:
    - toFQDNs:
        - matchName: grafana.com
        - matchName: storage.googleapis.com
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-vmagent
spec:
  description: allow victoria-metrics agent to access other pods
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: vmagent
  egress:
    - toEndpoints:
        - matchExpressions:
            - key: io.kubernetes.pod.namespace
              operator: In
              values:
                - victoria-metrics
                - kube-system
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
            - port: "8428"
              protocol: TCP
            - port: "9429"
              protocol: TCP
            - port: "9428"
              protocol: TCP
            - port: "8080"
              protocol: TCP
            - port: "9153"
              protocol: TCP
---
