apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics
spec:
  interval: 10m
  install:
    timeout: 20m
  upgrade:
    timeout: 20m
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      version: "0.33.0"
      sourceRef:
        kind: HelmRepository
        name: victoria-metrics
      interval: 10m
  values:
    server:
      persistentVolume:
        storageClassName: zfs-observability
